<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#14324a" />

<title>KapsVision Client Register</title>

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#efe8dc;
}

/* SIMPLE CLEAN UI (optimized for performance) */
.container{
  max-width:1000px;
  margin:auto;
  padding:15px;
}

h1{
  text-align:center;
  color:#14324a;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:20px;
  margin:5px;
  color:#fff;
  cursor:pointer;
}

.primary{background:#1f6f9a;}
.utility{background:#556573;}
.clear{background:#cf5b49;}

.list{
  margin-top:10px;
}

.item{
  background:#fff;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">
<h1>KapsVision</h1>

<div class="card">
<form id="form">

<input id="name" placeholder="Client Name">
<input id="phone" placeholder="Contact Number" inputmode="numeric">
<textarea id="address" placeholder="Address"></textarea>

<select id="state"></select>
<select id="city"></select>
<input id="cityManual" placeholder="Enter city" style="display:none">

<input id="pin" placeholder="Pin Code" inputmode="numeric">

<div>
<button class="primary">Save</button>
<button type="button" class="utility" id="exportBtn">Export Excel</button>
<button type="button" class="utility" id="backupBtn">Backup</button>
<button type="button" class="utility" id="restoreBtn">Restore</button>
<button type="button" class="clear" id="clearAll">Clear All</button>
<input type="file" id="restoreFile" hidden>
</div>

</form>
</div>

<div class="card">
<input id="search" placeholder="Search...">
<div id="list" class="list"></div>
</div>

</div>

<script src="india-locations.js"></script>

<script>
let STORAGE_KEY="KapsVision.clients.web";
let records=[];
let map=window.KAPSVISION_INDIA_LOCATIONS||{};

let list=document.getElementById("list");

/* SAFE STORAGE */
function save(){
 try{localStorage.setItem(STORAGE_KEY,JSON.stringify(records));}
 catch{alert("Storage blocked (iOS private mode)");}
}

function load(){
 try{
   records=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
 }catch{records=[];}
}

/* STATE CITY */
function loadStates(){
 let s=document.getElementById("state");
 s.innerHTML="<option>Select State</option>";
 Object.keys(map).forEach(x=>s.add(new Option(x,x)));
}

function loadCities(state){
 let c=document.getElementById("city");
 c.innerHTML="<option>Select City</option>";
 let arr=map[state]||[];
 arr.forEach(x=>c.add(new Option(x,x)));
 c.add(new Option("Other","other"));
}

state.onchange=()=>loadCities(state.value);

city.onchange=()=>{
 cityManual.style.display=(city.value==="other")?"block":"none";
};

/* RENDER */
function render(){
 let q=search.value.toLowerCase();

 list.innerHTML=records
 .filter(r=>JSON.stringify(r).toLowerCase().includes(q))
 .map(r=>`
 <div class="item">
 <b>${r.name}</b><br>
 ${r.phone}<br>
 ${r.city}, ${r.state}<br>
 ${r.pin}
 <br>
 <button onclick="del('${r.id}')">Delete</button>
 </div>`).join("");
}

/* DELETE */
function del(id){
 records=records.filter(x=>x.id!=id);
 save();render();
}

/* SAVE */
form.onsubmit=e=>{
 e.preventDefault();

 let data={
  id:Date.now(),
  name:name.value.trim(),
  phone:phone.value.trim(),
  address:address.value.trim(),
  state:state.value,
  city:(city.value==="other")?cityManual.value:city.value,
  pin:pin.value
 };

 if(Object.values(data).some(v=>!v)){
  alert("Fill all fields"); return;
 }

 if(!/^\d{10}$/.test(data.phone)){
  alert("Invalid phone"); return;
 }

 records.unshift(data);
 save();
 form.reset();
 render();
};

/* SEARCH */
search.oninput=render;

/* CLEAR ALL */
clearAll.onclick=()=>{
 if(confirm("Clear all?")){
  records=[];
  save();render();
 }
};

/* EXPORT CSV */
exportBtn.onclick=()=>{
 let csv="Name,Phone,State,City,Pin\n";
 records.forEach(r=>{
  csv+=`${r.name},${r.phone},${r.state},${r.city},${r.pin}\n`;
 });
 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="clients.csv";
 a.click();
};

/* BACKUP */
backupBtn.onclick=()=>{
 let blob=new Blob([JSON.stringify(records)]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="backup.json";
 a.click();
};

/* RESTORE */
restoreBtn.onclick=()=>restoreFile.click();

restoreFile.onchange=e=>{
 let file=e.target.files[0];
 let reader=new FileReader();
 reader.onload=x=>{
  try{
   records=JSON.parse(x.target.result);
   save();render();
   alert("Restored");
  }catch{alert("Invalid file");}
 };
 reader.readAsText(file);
};

/* SERVICE WORKER */
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
}

/* INIT */
loadStates();
load();
render();
<script>
/* INLINE SERVICE WORKER (iPhone-friendly workaround) */
if ("serviceWorker" in navigator) {

  const swCode = `
    const CACHE_NAME = "kapsvision-inline-v1";
    const FILES = ["./"];

    self.addEventListener("install", e => {
      e.waitUntil(
        caches.open(CACHE_NAME).then(c => c.addAll(FILES))
      );
    });

    self.addEventListener("fetch", e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;

  const blob = new Blob([swCode], { type: "text/javascript" });
  const swURL = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swURL)
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW failed:", err));
}
</script>

</body>
</html>
