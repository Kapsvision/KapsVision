<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- iPhone optimized viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14324a" />

  <!-- iOS App Mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>KapsVision Client Register</title>

  <style>
    :root {
      --shell: #efe8dc;
      --card: #ffffff;
      --ink: #10283f;
      --body: #24384a;
      --muted: #6a7a89;
      --soft: #f7fafc;
      --line: #dbe4eb;
      --blue: #1f6f9a;
      --gold: #d9b15f;
      --gold-deep: #b98522;
      --green: #4b8a2f;
      --red: #cf5b49;
      --shadow: 0 10px 25px rgba(0,0,0,0.08);
      --radius-lg: 18px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--shell);
    }

    body {
      -webkit-overflow-scrolling: touch;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* iPhone stable height */
    .app-shell {
      min-height: 100svh;
    }

    /* HEADER FIXED (no jump) */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(145deg, #0b1f33, #14324a);
      color: #fff;
      padding: 1rem;
      border-bottom: 3px solid var(--gold);
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-panel img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .title {
      margin: 0;
      font-size: 1.4rem;
    }

    .content {
      padding: 1rem;
    }

    .summary-card,
    .panel,
    .table-panel {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 1rem;
      margin-top: 1rem;
      box-shadow: var(--shadow);
    }

    .summary-label {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .summary-value {
      font-size: 1.6rem;
      font-weight: bold;
    }

    .form-area {
      display: grid;
      gap: 0.7rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.8rem;
      border-radius: var(--radius-sm);
      border: 1px solid #ccc;
      font-size: 16px; /* prevents zoom */
    }

    textarea {
      min-height: 100px;
    }

    button {
      padding: 0.8rem;
      border-radius: 999px;
      border: none;
      color: #fff;
      font-weight: bold;
    }

    .primary { background: var(--blue); }
    .utility { background: #6c7a86; }
    .clear { background: var(--red); }

    .actions-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .record-card {
      padding: 1rem;
      border-top: 1px solid #eee;
    }

    .record-name {
      font-weight: bold;
    }

    .search-box input {
      margin-top: 1rem;
    }

  </style>
</head>

<body>
<div class="app-shell">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo-panel">
        <img src="logo.png" alt="logo">
      </div>
      <h1 class="title">KapsVision</h1>
    </div>
  </header>

  <main class="content">

    <!-- SUMMARY -->
    <div class="summary-card">
      <div class="summary-label">Total Clients</div>
      <div class="summary-value" id="totalClients">0</div>
    </div>

    <!-- FORM -->
    <div class="panel">
      <form id="clientForm">
        <div class="form-area">
          <input id="clientName" placeholder="Client Name">
          <input id="contactNumber" placeholder="Contact Number">

          <select id="state"></select>
          <select id="city"></select>

          <textarea id="address" placeholder="Address"></textarea>
          <input id="pinCode" placeholder="Pin Code">
        </div>

        <div class="actions-row">
          <button class="primary" type="submit">Save</button>
          <button class="utility" type="button" id="clearFormBtn">Clear</button>
          <button class="clear" type="button" id="clearAllBtn">Clear All</button>
        </div>
      </form>
    </div>

    <!-- SEARCH -->
    <div class="table-panel">
      <input id="searchInput" placeholder="Search clients">

      <div id="mobileList"></div>
    </div>

  </main>
</div>

<script>
const STORAGE_KEY = "KapsVision.clients.web";
let records = [];

const form = document.getElementById("clientForm");
const list = document.getElementById("mobileList");
const total = document.getElementById("totalClients");

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function load() {
  records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}

function render() {
  total.textContent = records.length;

  list.innerHTML = records.map(r => `
    <div class="record-card">
      <div class="record-name">${r.clientName}</div>
      <div>${r.contactNumber}</div>
      <div>${r.city}, ${r.state}</div>
      <button onclick="del('${r.id}')">Delete</button>
    </div>
  `).join("");
}

function del(id) {
  records = records.filter(r => r.id !== id);
  save();
  render();
}

form.onsubmit = e => {
  e.preventDefault();

  const data = {
    id: Date.now()+"",
    clientName: clientName.value,
    contactNumber: contactNumber.value,
    state: state.value,
    city: city.value,
    address: address.value,
    pinCode: pinCode.value
  };

  if(Object.values(data).some(v => !v)) return alert("Fill all");

  records.unshift(data);
  save();
  render();
  form.reset();
};

document.getElementById("clearAllBtn").onclick = () => {
  records = [];
  save();
  render();
};

load();
render();
</script>

</body>
</html>
