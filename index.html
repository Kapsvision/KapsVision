<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14324a" />

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KapsVision">
  <link rel="apple-touch-icon" href="logo.png">

  <title>KapsVision Client Register</title>

  <style>
    :root {
      --shell: #efe8dc;
      --card: #ffffff;
      --ink: #10283f;
      --body: #24384a;
      --muted: #6a7a89;
      --soft: #f7fafc;
      --soft-2: #fbfcfd;
      --line: #dbe4eb;
      --blue: #1f6f9a;
      --gold: #d9b15f;
      --gold-deep: #b98522;
      --royal-night: #0b1f33;
      --royal-navy: #112e49;
      --green: #4b8a2f;
      --red: #cf5b49;
      --shadow: 0 16px 34px rgba(20, 50, 74, 0.08);
      --radius-lg: 18px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--shell);
    }

    /* ===== SHINING STARS ===== */
    @keyframes shiningStars {
      0% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 0.9; transform: scale(1.2); }
      100% { opacity: 0.2; transform: scale(0.8); }
    }

    .watermark-sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .watermark-sparkles::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.9) 0 1.5px, transparent 2px),
        radial-gradient(circle, rgba(255,240,200,0.8) 0 2px, transparent 2.5px);
      background-size: 120px 120px, 180px 180px;
      background-position: 10% 20%, 80% 30%;
      animation: shiningStars 4s infinite;
    }

    .watermark-sparkles::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.95) 0 1.2px, transparent 2px),
        radial-gradient(circle, rgba(255,245,210,0.85) 0 1.6px, transparent 2px);
      background-size: 160px 160px, 220px 220px;
      background-position: 60% 10%, 30% 85%;
      animation: shiningStars 6s infinite;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(145deg, #0b1f33, #112e49);
      color: white;
      padding: 1rem;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: 2rem;
    }

    /* ===== FORM ===== */
    .content {
      padding: 1rem;
      max-width: 900px;
      margin: auto;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.7rem;
      margin-top: 0.4rem;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 20px;
      background: var(--blue);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .record {
      background: white;
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

  </style>
</head>

<body>

<div class="watermark-sparkles"></div>

<header class="header">
  <h1 class="title">KapsVision</h1>
</header>

<main class="content">

<form id="clientForm">
  <input id="clientName" placeholder="Client Name">
  <input id="contactNumber" placeholder="Contact Number">
  <input id="state" placeholder="State">
  <input id="city" placeholder="City">
  <textarea id="address" placeholder="Address"></textarea>
  <input id="pinCode" placeholder="Pin Code">

  <button type="submit">Save Client</button>
</form>

<div id="records"></div>

</main>

<script>
const STORAGE_KEY = "KapsVision.clients.web";
let records = [];

function load() {
  try {
    records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch {
    records = [];
  }
  render();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function render() {
  const container = document.getElementById("records");
  container.innerHTML = records.map(r => `
    <div class="record">
      <b>${r.clientName}</b><br>
      ${r.contactNumber}<br>
      ${r.state}, ${r.city}<br>
      ${r.address}<br>
      ${r.pinCode}
    </div>
  `).join("");
}

document.getElementById("clientForm").addEventListener("submit", e => {
  e.preventDefault();

  const data = {
    clientName: clientName.value,
    contactNumber: contactNumber.value,
    state: state.value,
    city: city.value,
    address: address.value,
    pinCode: pinCode.value
  };

  if (records.some(r => r.contactNumber === data.contactNumber)) {
    alert("Duplicate contact!");
    return;
  }

  records.unshift(data);
  save();
  render();
  e.target.reset();
});

load();
</script>

<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
