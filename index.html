<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>KapsVision Client Register</title>

<style>
:root {
  --shell:#efe8dc;
  --card:#ffffff;
  --ink:#14324a;
  --body:#24384a;
  --muted:#6a7a89;
  --soft:#f7fafc;
  --soft-2:#fbfcfd;
  --line:#dbe4eb;
  --blue:#1f6f9a;
  --gold:#d7a750;
  --gold-deep:#c28725;
  --green:#4b8a2f;
  --red:#cf5b49;
  --shadow:0 16px 34px rgba(20,50,74,0.08);
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:"Segoe UI",Tahoma,sans-serif;
  background:var(--shell);
  color:var(--body);
}

/* APP BACKGROUND */
.app-shell{
  min-height:100vh;
  background:
    radial-gradient(circle at 12% 0%, rgba(255,231,170,0.95), transparent 20rem),
    radial-gradient(circle at 88% 6%, rgba(215,167,80,0.38), transparent 22rem),
    var(--shell);
}

/* HEADER */
.header{
  background:linear-gradient(145deg,#10283b,#14324a,#1a3950);
  color:#fff;
  border-bottom:4px solid var(--gold);
  padding:1.4rem 1rem;
}

/* UPDATED SPACING */
.header-inner{
  width:min(1100px,100%);
  margin:auto;
  display:grid;
  grid-template-columns:112px 1fr;
  gap:1.5rem; /* FIXED SPACING */
  align-items:center;
}

/* LOGO PANEL FIXED */
.logo-panel{
  width:112px;
  height:112px;
  display:grid;
  place-items:center;
  background:transparent; /* removed box */
  box-shadow:none;
}

/* PREMIUM LOGO */
.logo-panel img{
  width:132px;
  filter:
    drop-shadow(0 10px 18px rgba(0,0,0,0.25))
    drop-shadow(0 0 20px rgba(215,167,80,0.35));
}

.title{
  margin:0;
  font-size:2.2rem;
  font-family:Georgia,serif;
}

/* CONTENT */
.content{
  width:min(1100px,95%);
  margin:1rem auto;
}

/* CARD */
.summary-card,.panel{
  background:#fff;
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:1rem;
  margin-bottom:1rem;
}

/* FORM */
.field input,.field textarea{
  width:100%;
  padding:0.8rem;
  border-radius:10px;
  border:1px solid #ccc;
}

/* BUTTONS */
button{
  padding:0.8rem 1rem;
  border:none;
  border-radius:999px;
  color:#fff;
  cursor:pointer;
}

.primary{background:var(--blue);}
.utility{background:#556573;}
.clear{background:var(--red);}

/* RESPONSIVE */
@media(min-width:720px){
  .header-inner{
    grid-template-columns:144px 1fr;
    gap:2rem;
  }

  .logo-panel{
    width:144px;
    height:144px;
  }

  .logo-panel img{
    width:170px;
  }
}
</style>
</head>

<body>

<div class="app-shell">

<header class="header">
  <div class="header-inner">
    
    <div class="logo-panel">
      <img src="logo.png" alt="KapsVision Logo">
    </div>

    <h1 class="title">KapsVision</h1>

  </div>
</header>

<main class="content">

<div class="summary-card">
  <b>Total Clients:</b> <span id="totalClients">0</span>
</div>

<div class="panel">
<form id="clientForm">

<div class="field">
<input id="clientName" placeholder="Client Name">
</div>

<div class="field">
<input id="contactNumber" placeholder="Contact Number">
</div>

<div class="field">
<textarea id="address" placeholder="Address"></textarea>
</div>

<button class="primary">Save Client</button>
<button type="button" class="clear" id="clearAll">Clear All</button>

</form>
</div>

</main>
</div>

<script>
let records=[];
const form=document.getElementById("clientForm");

form.addEventListener("submit",e=>{
e.preventDefault();

records.push({
name:clientName.value,
contact:contactNumber.value,
address:address.value
});

localStorage.setItem("clients",JSON.stringify(records));
document.getElementById("totalClients").innerText=records.length;

form.reset();
});

document.getElementById("clearAll").onclick=()=>{
records=[];
localStorage.clear();
document.getElementById("totalClients").innerText=0;
};
</script>

</body>
</html>
