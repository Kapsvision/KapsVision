<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KapsVision CRM</title>

<style>
body { font-family:Segoe UI; margin:0; background:#efe8dc; }

/* GOLDEN BACKGROUND */
@keyframes glow {
  0%{opacity:.3}50%{opacity:1}100%{opacity:.3}
}
.bg::before{
  content:"";
  position:fixed;inset:0;
  background:
    radial-gradient(circle,#ffd700 1px,transparent 2px) 20px 20px/120px 120px;
  animation:glow 4s infinite;
}

/* HEADER */
.header{
  background:#112e49;
  color:#fff;
  padding:12px;
  text-align:center;
}

/* LOGIN */
.login{
  max-width:300px;
  margin:80px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:10px;
}

.cards{
  display:flex;
  gap:10px;
}
.card{
  flex:1;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

/* CLIENT LIST */
.record{
  background:#fff;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}

.actions button{
  width:auto;
  margin-right:5px;
}
</style>
</head>

<body class="bg">

<div class="header">
  <h2>KapsVision CRM</h2>
</div>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h3>Admin Login</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="app">

<div class="cards">
  <div class="card">Clients: <b id="total">0</b></div>
</div>

<!-- FORM -->
<h3>Add Client</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">
<button onclick="add()">Save</button>

<button onclick="exportData()">Export Backup</button>

<input id="search" placeholder="Search..." oninput="render()">

<div id="list"></div>

</div>

<script>
const KEY="crm";
let data=[];
let editId=null;

/* LOGIN */
function login(){
  if(user.value==="admin" && pass.value==="1234"){
    loginBox.style.display="none";
    app.style.display="block";
    load();
  } else alert("Wrong login");
}

/* LOAD/SAVE */
function load(){
  data=JSON.parse(localStorage.getItem(KEY))||[];
  render();
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(data));
}

/* ADD/EDIT */
function add(){
  if(!name.value||!phone.value)return alert("Fill all");

  if(editId){
    let r=data.find(x=>x.id==editId);
    r.name=name.value;
    r.phone=phone.value;
    r.city=city.value;
    editId=null;
  } else {
    data.unshift({
      id:Date.now(),
      name:name.value,
      phone:phone.value,
      city:city.value
    });
  }

  save();
  render();
  name.value=phone.value=city.value="";
}

/* DELETE */
function del(id){
  if(!confirm("Delete client?"))return;
  data=data.filter(x=>x.id!=id);
  save();
  render();
}

/* EDIT */
function edit(id){
  let r=data.find(x=>x.id==id);
  name.value=r.name;
  phone.value=r.phone;
  city.value=r.city;
  editId=id;
}

/* RENDER */
function render(){
  let q=search.value.toLowerCase();

  let filtered=data.filter(r=>
    r.name.toLowerCase().includes(q)||
    r.phone.includes(q)||
    r.city.toLowerCase().includes(q)
  );

  total.innerText=data.length;

  list.innerHTML=filtered.map(r=>`
    <div class="record">
      <b>${r.name}</b><br>
      ${r.phone} | ${r.city}
      <div class="actions">
        <button onclick="edit(${r.id})">Edit</button>
        <button onclick="del(${r.id})">Delete</button>
      </div>
    </div>
  `).join("");
}

/* EXPORT */
function exportData(){
  let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="crm-backup.json";
  a.click();
}
</script>

</body>
</html>
