<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />

<!-- Mobile + iOS PWA -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14324a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KapsVision">

<!-- iOS Icon -->
<link rel="apple-touch-icon" href="logo-192.png">

<title>KapsVision Client Register</title>

<style>
:root{
  --shell:#efe8dc;
  --card:#fff;
  --ink:#10283f;
  --body:#24384a;
  --muted:#6a7a89;
  --blue:#1f6f9a;
  --gold:#d9b15f;
  --green:#4b8a2f;
  --red:#cf5b49;
}

/* iOS Fixes */
html,body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:var(--shell);
  -webkit-overflow-scrolling:touch;
  padding-bottom:env(safe-area-inset-bottom);
  padding-top:env(safe-area-inset-top);
}

/* Prevent zoom */
input,select,textarea{
  font-size:16px;
}

/* Remove iOS styles */
button,input,textarea,select{
  -webkit-appearance:none;
  appearance:none;
}

/* Tap fix */
button{
  -webkit-tap-highlight-color:transparent;
}

/* Layout */
.header{
  background:#10283f;
  color:#fff;
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
}

.header img{
  width:70px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.content{
  padding:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:5px;
}

button{
  background:var(--blue);
  color:#fff;
  padding:12px;
  border-radius:25px;
  margin-top:10px;
  width:100%;
}

.delete{
  background:var(--red);
}

.record{
  border-top:1px solid #eee;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <div class="title">KapsVision</div>
</div>

<div class="content">

<div class="card">
<form id="form">

<label>Client Name</label>
<input id="name">

<label>Contact</label>
<input id="contact" type="tel">

<label>State</label>
<input id="state">

<label>City</label>
<input id="city">

<label>Address</label>
<textarea id="address"></textarea>

<label>Pin Code</label>
<input id="pin">

<button type="submit">Save Client</button>
<button type="button" class="delete" onclick="clearAll()">Clear All</button>

</form>
</div>

<div class="card">
<input id="search" placeholder="Search clients...">
<div id="list"></div>
</div>

</div>

<script>
const KEY="KapsVision.clients.web";
let data=[];

/* Load */
function load(){
  try{
    let saved=localStorage.getItem(KEY);

    if(!saved){
      data=[];
      return;
    }

    data=JSON.parse(saved);

    if(!Array.isArray(data)) data=[];
  }catch{
    data=[];
  }
}

/* Save */
function save(){
  localStorage.setItem(KEY,JSON.stringify(data));
}

/* Render */
function render(){
  let list=document.getElementById("list");
  let q=document.getElementById("search").value.toLowerCase();

  list.innerHTML="";

  data.filter(d=>{
    return Object.values(d).join(" ").toLowerCase().includes(q);
  }).forEach(d=>{
    let div=document.createElement("div");
    div.className="record";

    div.innerHTML=`
      <b>${d.name}</b><br>
      ${d.contact}<br>
      ${d.city}, ${d.state}<br>
      ${d.address}<br>
      ${d.pin}
      <br><button class="delete" onclick="del('${d.id}')">Delete</button>
    `;

    list.appendChild(div);
  });
}

/* Add */
document.getElementById("form").onsubmit=e=>{
  e.preventDefault();

  let obj={
    id:Date.now(),
    name:name.value,
    contact:contact.value,
    state:state.value,
    city:city.value,
    address:address.value,
    pin:pin.value
  };

  if(Object.values(obj).some(v=>!v)){
    alert("Fill all fields");
    return;
  }

  data.unshift(obj);
  save();
  render();
  e.target.reset();
};

/* Delete */
function del(id){
  data=data.filter(d=>d.id!=id);
  save();
  render();
}

/* Clear */
function clearAll(){
  if(confirm("Delete all?")){
    data=[];
    save();
    render();
  }
}

/* Search */
search.oninput=render;

/* Init */
load();
render();
</script>

</body>
</html>
