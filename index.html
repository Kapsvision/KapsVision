<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KapsVision CRM</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fa;
  margin:0;
}

header{
  background:#10283f;
  color:#fff;
  padding:15px;
  text-align:center;
}

.container{
  padding:15px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:20px;
  color:#fff;
  cursor:pointer;
}

.primary{background:#1f6f9a;}
.utility{background:#555;}
.clear{background:#c0392b;}

.card{
  background:#fff;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<header>
<h2>KapsVision CRM</h2>
</header>

<div class="container">

<form id="form">
<input id="name" placeholder="Client Name">
<input id="phone" placeholder="Phone">
<input id="state" placeholder="State">
<input id="city" placeholder="City">
<textarea id="address" placeholder="Address"></textarea>
<input id="pin" placeholder="Pin Code">

<button class="primary">Save</button>
<button type="button" id="clear">Clear</button>
<button type="button" id="clearAll" class="clear">Clear All</button>

<br>

<button type="button" id="export" class="utility">Export</button>
<button type="button" id="importBtn" class="utility">Import</button>
<input type="file" id="importFile" hidden>

</form>

<input id="search" placeholder="Search">

<div id="list"></div>

</div>

<script>
let STORAGE="kapsvision";
let data=JSON.parse(localStorage.getItem(STORAGE))||[];

let form=document.getElementById("form");
let list=document.getElementById("list");
let search=document.getElementById("search");

function save(){
  localStorage.setItem(STORAGE,JSON.stringify(data));
}

function render(){
  let q=search.value.toLowerCase();

  let filtered=data.filter(d=>
    Object.values(d).join(" ").toLowerCase().includes(q)
  );

  list.innerHTML="";

  if(!filtered.length){
    list.innerHTML="<p>No data</p>";
    return;
  }

  filtered.forEach(d=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${d.name}</b><br>
      ${d.phone}<br>
      ${d.address}<br>
      ${d.state}, ${d.city} - ${d.pin}<br><br>

      <button onclick="edit('${d.id}')">Edit</button>
      <button onclick="del('${d.id}')" class="clear">Delete</button>
    `;

    list.appendChild(div);
  });
}

function isDuplicate(newData){
  return data.some(d =>
    d.name.toLowerCase()===newData.name.toLowerCase() &&
    d.phone===newData.phone
  );
}

form.onsubmit=e=>{
  e.preventDefault();

  let d={
    id:Date.now()+"",
    name:name.value.trim(),
    phone:phone.value.trim(),
    state:state.value.trim(),
    city:city.value.trim(),
    address:address.value.trim(),
    pin:pin.value.trim()
  };

  if(Object.values(d).some(v=>!v)){
    alert("Fill all fields");
    return;
  }

  if(isDuplicate(d)){
    alert("Duplicate client");
    return;
  }

  data.unshift(d);
  save();
  render();
  form.reset();
};

function del(id){
  data=data.filter(d=>d.id!==id);
  save();
  render();
}

function edit(id){
  let d=data.find(x=>x.id===id);

  name.value=d.name;
  phone.value=d.phone;
  state.value=d.state;
  city.value=d.city;
  address.value=d.address;
  pin.value=d.pin;

  del(id);
}

document.getElementById("clear").onclick=()=>form.reset();

document.getElementById("clearAll").onclick=()=>{
  if(confirm("Delete all?")){
    data=[];
    save();
    render();
  }
};

search.oninput=render;

// EXPORT
document.getElementById("export").onclick=()=>{
  let blob=new Blob([JSON.stringify(data,null,2)]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="clients.json";
  a.click();
};

// IMPORT
document.getElementById("importBtn").onclick=()=>{
  document.getElementById("importFile").click();
};

document.getElementById("importFile").onchange=e=>{
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=ev=>{
    let imported=JSON.parse(ev.target.result);
    data=imported.concat(data);
    save();
    render();
  };

  reader.readAsText(file);
};

render();
</script>

</body>
</html>
