<script>
(function () {
  var STORAGE_KEY = "KapsVision.clients.web";
  var cityStateMap = window.KAPSVISION_INDIA_LOCATIONS || {};
  var records = [];

  var form = document.getElementById("clientForm");
  var searchInput = document.getElementById("searchInput");
  var statusMessage = document.getElementById("statusMessage");
  var desktopTableBody = document.getElementById("desktopTableBody");
  var mobileList = document.getElementById("mobileList");
  var stateSelect = document.getElementById("state");
  var citySelect = document.getElementById("city");
  var cityManual = document.getElementById("cityManual");

  function cleanText(v) {
    return String(v || "").trim();
  }

  function setStatus(msg) {
    statusMessage.textContent = msg;
  }

  // ✅ Safe LocalStorage (iOS fix)
  function saveRecords() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    } catch (e) {
      setStatus("Storage failed. iOS private mode may block saving.");
    }
  }

  function loadRecords() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      records = saved ? JSON.parse(saved) : [];
      if (!Array.isArray(records)) records = [];
      setStatus(records.length + " client(s) loaded.");
    } catch {
      records = [];
      setStatus("Storage read failed. Starting fresh.");
    }
  }

  function populateStates() {
    Object.keys(cityStateMap).sort().forEach(function (s) {
      stateSelect.add(new Option(s, s));
    });
  }

  function loadCities(state, selectedCity) {
    var cities = cityStateMap[state] || [];

    citySelect.innerHTML = "";
    citySelect.add(new Option("Select city", ""));
    citySelect.disabled = !cities.length;

    cities.forEach(function (c) {
      citySelect.add(new Option(c, c));
    });

    if (cities.length) {
      citySelect.add(new Option("Other", "__OTHER__"));
    }

    cityManual.classList.add("hidden");

    if (selectedCity) {
      if (cities.includes(selectedCity)) {
        citySelect.value = selectedCity;
      } else {
        citySelect.value = "__OTHER__";
        cityManual.value = selectedCity;
        cityManual.classList.remove("hidden");
      }
    }
  }

  function getCity() {
    return citySelect.value === "__OTHER__"
      ? cleanText(cityManual.value)
      : cleanText(citySelect.value);
  }

  function toggleManualCity() {
    if (citySelect.value === "__OTHER__") {
      cityManual.classList.remove("hidden");
      cityManual.focus();
    } else {
      cityManual.classList.add("hidden");
      cityManual.value = "";
    }
  }

  function getFormData() {
    return {
      name: cleanText(clientName.value),
      phone: cleanText(contactNumber.value),
      address: cleanText(address.value),
      state: cleanText(stateSelect.value),
      city: getCity(),
      pin: cleanText(pinCode.value)
    };
  }

  function validate(data) {
    if (Object.values(data).some(v => !v)) return "Fill all fields";

    if (!/^\d{10}$/.test(data.phone))
      return "Enter valid 10-digit contact number";

    if (!/^\d{6}$/.test(data.pin))
      return "Enter valid 6-digit PIN";

    return null;
  }

  function resetForm() {
    form.reset();
    loadCities("", "");
  }

  function escapeHtml(v) {
    return v.replace(/[&<>"']/g, function (m) {
      return ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[m];
    });
  }

  function render() {
    var q = cleanText(searchInput.value).toLowerCase();

    var filtered = records.filter(r =>
      Object.values(r).join(" ").toLowerCase().includes(q)
    );

    document.getElementById("totalClients").textContent = records.length;

    if (!filtered.length) {
      desktopTableBody.innerHTML =
        '<tr><td colspan="7" class="empty-row">No records</td></tr>';
      mobileList.innerHTML =
        '<div class="empty-row">No records</div>';
      return;
    }

    desktopTableBody.innerHTML = filtered.map(r => `
      <tr>
        <td><b>${escapeHtml(r.name)}</b></td>
        <td>${r.phone}</td>
        <td>${escapeHtml(r.address)}</td>
        <td>${r.state}</td>
        <td>${r.city}</td>
        <td>${r.pin}</td>
        <td><button class="delete-btn" data-id="${r.id}">Delete</button></td>
      </tr>
    `).join("");

    mobileList.innerHTML = filtered.map(r => `
      <div class="record-card">
        <b>${escapeHtml(r.name)}</b><br>
        ${r.phone}<br>
        ${r.city}, ${r.state}
        <div style="margin-top:8px;">
          <button class="delete-btn" data-id="${r.id}">Delete</button>
        </div>
      </div>
    `).join("");
  }

  function deleteRecord(id) {
    records = records.filter(r => r.id !== id);
    saveRecords();
    render();
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    var data = getFormData();
    var error = validate(data);

    if (error) {
      setStatus(error);
      return;
    }

    records.unshift({
      id: Date.now().toString(),
      ...data
    });

    saveRecords();
    render();
    resetForm();

    setStatus("Client saved successfully");
  });

  document.addEventListener("click", function (e) {
    if (e.target.dataset.id) {
      deleteRecord(e.target.dataset.id);
    }
  });

  searchInput.addEventListener("input", render);
  stateSelect.addEventListener("change", () => loadCities(stateSelect.value, ""));
  citySelect.addEventListener("change", toggleManualCity);

  populateStates();
  loadCities("", "");
  loadRecords();
  render();
})();
</script>
