<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14324a" />
  <title>KapsVision Client Register</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #efe8dc;
      color: #24384a;
    }

    .header {
      background: #10283f;
      color: #fff;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header img {
      width: 60px;
    }

    .container {
      padding: 15px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-family: inherit;
    }

    textarea {
      min-height: 80px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 20px;
      background: #1f6f9a;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    .delete {
      background: #cf5b49;
    }

    .card {
      background: #fff;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="logo.png" alt="logo">
    <h2>KapsVision</h2>
  </div>

  <div class="container">

    <input id="clientName" placeholder="Client Name">
    <input id="contactNumber" placeholder="Contact Number">
    <input id="state" placeholder="State">
    <input id="city" placeholder="City">
    <textarea id="address" placeholder="Address"></textarea>
    <input id="pinCode" placeholder="Pin Code">

    <button onclick="saveClient()">Save Client</button>

    <div id="clientList"></div>

  </div>

  <script>
    let records = JSON.parse(localStorage.getItem("kapsvision.clients")) || [];

    function saveClient() {
      const client = {
        id: Date.now(),
        name: document.getElementById("clientName").value.trim(),
        phone: document.getElementById("contactNumber").value.trim(),
        state: document.getElementById("state").value.trim(),
        city: document.getElementById("city").value.trim(),
        address: document.getElementById("address").value.trim(),
        pin: document.getElementById("pinCode").value.trim()
      };

      if (!client.name || !client.phone) {
        alert("Please enter required details");
        return;
      }

      records.unshift(client);
      localStorage.setItem("kapsvision.clients", JSON.stringify(records));

      clearForm();
      renderClients();
    }

    function renderClients() {
      const container = document.getElementById("clientList");

      if (!records.length) {
        container.innerHTML = "<p>No clients saved.</p>";
        return;
      }

      container.innerHTML = records.map(c => `
        <div class="card">
          <strong>${c.name}</strong><br>
          ${c.phone}<br>
          ${c.city}, ${c.state}<br>
          ${c.address}<br>
          ${c.pin}<br><br>
          <button class="delete" onclick="deleteClient(${c.id})">Delete</button>
        </div>
      `).join("");
    }

    function deleteClient(id) {
      records = records.filter(c => c.id !== id);
      localStorage.setItem("kapsvision.clients", JSON.stringify(records));
      renderClients();
    }

    function clearForm() {
      document.getElementById("clientName").value = "";
      document.getElementById("contactNumber").value = "";
      document.getElementById("state").value = "";
      document.getElementById("city").value = "";
      document.getElementById("address").value = "";
      document.getElementById("pinCode").value = "";
    }

    renderClients();
  </script>

</body>
</html>
