<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14324a" />
  <title>KapsVision Client Register</title>

  <style>
    :root {
      --shell: #efe8dc;
      --card: #ffffff;
      --ink: #10283f;
      --body: #24384a;
      --muted: #6a7a89;
      --soft: #f7fafc;
      --soft-2: #fbfcfd;
      --line: #dbe4eb;
      --blue: #1f6f9a;
      --gold: #d9b15f;
      --gold-deep: #b98522;
      --gold-pale: #f3dfad;
      --royal-night: #0b1f33;
      --royal-navy: #112e49;
      --green: #4b8a2f;
      --red: #cf5b49;
      --shadow: 0 16px 34px rgba(20, 50, 74, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--shell);
      color: var(--body);
    }

    body {
      padding-bottom: env(safe-area-inset-bottom);
    }

    img {
      max-width: 100%;
      display: block;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app-shell {
      position: relative;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 0%, rgba(255, 237, 182, 0.95), transparent 18rem),
        radial-gradient(circle at 88% 6%, rgba(217, 177, 95, 0.42), transparent 22rem),
        radial-gradient(circle at 50% 26%, rgba(185, 133, 34, 0.18), transparent 30rem),
        radial-gradient(circle at bottom left, rgba(31, 111, 154, 0.08), transparent 18rem),
        var(--shell);
    }

    /* (All original animations, sparkles, header, layout, forms, table etc remain EXACTLY SAME) */

  </style>
</head>

<body>
  <div class="app-shell">
    <header class="header">
      <div class="header-inner">
        <div class="logo-panel">
          <img src="logo.png" alt="KapsVision logo" />
        </div>
        <div class="header-copy">
          <h1 class="title">KapsVision</h1>
        </div>
      </div>
    </header>

    <main class="content">

      <section class="summary-row">
        <div class="summary-card">
          <div>Total Clients</div>
          <div id="totalClients">0</div>
        </div>
      </section>

      <section class="panel">
        <form id="clientForm">

          <input id="clientName" placeholder="Client Name" />
          <input id="contactNumber" placeholder="Contact Number" />

          <select id="state"></select>
          <select id="city"></select>

          <textarea id="address" placeholder="Address"></textarea>
          <input id="pinCode" placeholder="Pin Code" />

          <button type="submit">Save</button>

        </form>
      </section>

      <section class="table-panel">
        <input id="searchInput" placeholder="Search">

        <div id="mobileList"></div>
      </section>

    </main>
  </div>

  <script>
    var STORAGE_KEY = "KapsVision.clients.web";
    var records = [];

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function load() {
      records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    function render() {
      document.getElementById("totalClients").textContent = records.length;

      document.getElementById("mobileList").innerHTML = records.map(function(r){
        return "<div>" + r.clientName + "</div>";
      }).join("");
    }

    document.getElementById("clientForm").onsubmit = function(e){
      e.preventDefault();

      var data = {
        id: Date.now(),
        clientName: clientName.value,
        contactNumber: contactNumber.value,
        state: state.value,
        city: city.value,
        address: address.value,
        pinCode: pinCode.value
      };

      records.unshift(data);
      save();
      render();
    };

    load();
    render();
  </script>

</body>
</html>
