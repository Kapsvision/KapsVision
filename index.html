<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>KapsVision Client Register</title>

<!-- PWA + iOS -->
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="logo.png" />
<meta name="theme-color" content="#14324a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="KapsVision" />

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#efe8dc;
  padding-bottom:env(safe-area-inset-bottom);
  padding-top:env(safe-area-inset-top);
}

/* iOS zoom fix */
input,textarea,select{
  font-size:16px;
}

/* SIMPLE CLEAN UI */
.header{
  background:#10283f;
  color:#fff;
  padding:15px;
  display:flex;
  align-items:center;
  gap:15px;
}

.header img{
  width:60px;
}

.container{
  padding:15px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#1f6f9a;
  color:#fff;
  font-weight:bold;
}

.list{
  margin-top:20px;
}

.card{
  background:#fff;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

.delete{
  background:red;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <h2>KapsVision</h2>
</div>

<div class="container">

<input id="name" placeholder="Client Name">
<input id="phone" placeholder="Contact Number">
<input id="state" placeholder="State">
<input id="city" placeholder="City">
<textarea id="address" placeholder="Address"></textarea>
<input id="pin" placeholder="Pin Code">

<button onclick="save()">Save Client</button>
<button onclick="exportData()">Export</button>
<button onclick="document.getElementById('file').click()">Import</button>
<input type="file" id="file" hidden>

<div class="list" id="list"></div>

</div>

<script>
let records = JSON.parse(localStorage.getItem("kaps")) || [];

function save(){
  let data = {
    id: Date.now(),
    name: name.value.trim(),
    phone: phone.value.trim(),
    state: state.value.trim(),
    city: city.value.trim(),
    address: address.value.trim(),
    pin: pin.value.trim()
  };

  if(!data.name || data.phone.length!=10){
    alert("Enter valid details");
    return;
  }

  records.unshift(data);
  localStorage.setItem("kaps", JSON.stringify(records));

  clearForm();
  render();
}

function clearForm(){
  document.querySelectorAll("input,textarea").forEach(e=>e.value="");
}

function render(){
  list.innerHTML = records.map(r=>`
    <div class="card">
      <b>${r.name}</b><br>
      ${r.phone}<br>
      ${r.city}, ${r.state}<br>
      ${r.address}<br>
      ${r.pin}<br><br>
      <button class="delete" onclick="del(${r.id})">Delete</button>
    </div>
  `).join("");
}

function del(id){
  records = records.filter(r=>r.id!==id);
  localStorage.setItem("kaps", JSON.stringify(records));
  render();
}

/* EXPORT */
function exportData(){
  const blob = new Blob([JSON.stringify(records)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download="clients.json";
  a.click();
}

/* IMPORT */
file.onchange = function(){
  const reader = new FileReader();
  reader.onload = function(){
    records = JSON.parse(reader.result);
    localStorage.setItem("kaps", JSON.stringify(records));
    render();
  };
  reader.readAsText(this.files[0]);
}

/* SERVICE WORKER */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

render();
</script>

</body>
</html>
